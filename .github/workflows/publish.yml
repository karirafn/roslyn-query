name: publish

on:
  push:
    tags: ['release-*']

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#release-}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: dotnet build roslyn-query.slnx -c Release --no-incremental

      - name: Test
        run: dotnet test roslyn-query.slnx -c Release --no-build

      - name: Pack
        run: dotnet pack src/roslyn-query.csproj -c Release -p:Version=${{ steps.version.outputs.value }} --no-build -o ./artifacts

      - name: NuGet login (Trusted Publishing)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
